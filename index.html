<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSA Ravi Study App</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- Splash Screen -->
<div id="splash">RSA Ravi Study App</div>

<!-- Login Page -->
<div id="loginPage" class="card">
<h2>Login</h2>
<input type="text" id="username" placeholder="Enter Name">
<button onclick="login()">Login</button>
</div>

<!-- Main App -->
<div id="app" style="display:none;">

<header>
<span id="welcome"></span>
<button onclick="logout()">Logout</button>
</header>

<nav>
<button onclick="showSection('notes')">Notes</button>
<button onclick="showSection('profile')">Profile</button>
<button onclick="showSection('upload')">Upload PDF</button>
</nav>

<!-- Notes Section -->
<div id="notes" class="section">
<h3>Select Subject</h3>
<select id="subjectSelect">
<option>Applied Mathematics 2</option>
<option>Applied Chemistry</option>
<option>Engineering Mechanics</option>
<option>Basic Electical Engineering</option>
<option>Environmental Science</option>
<option>Essenital of Language & Communication 2</option>
</select>

<input type="text" id="noteInput" placeholder="Write note">
<button onclick="addNote()">Add</button>

<div id="notesList"></div>
</div>

<!-- Profile Section -->
<div id="profile" class="section" style="display:none;">
<h3>Profile</h3>
<p id="profileName"></p>
</div>

<!-- Upload Section -->
<div id="upload" class="section" style="display:none;">
<h3>Upload PDF</h3>
<input type="file" accept="application/pdf" onchange="uploadPDF(event)">
<div id="pdfList"></div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
